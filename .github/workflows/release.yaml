name: Release

on:
    push:
        branches:
            - master

jobs:
    verify:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Run unit tests
              run: docker compose -f docker-compose.test.yml run --rm api-test-unit

            - name: Run integration test
              run: docker compose -f docker-compose.test.yml run --rm api-test-integration

            - name: Cleanup
              if: always()
              run: docker compose -f docker-compose.test.yml down -v

    docker:
        needs: verify

        runs-on: ubuntu-latest

        permissions:
            packages: write
            contents: read

        steps:
            - uses: actions/checkout@v4

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}
        
            - name: Build backend image
              run: |
                docker build \
                -t ghcr.io/${{ github.repository }}/backend:latest \
                backend
            - name: Build frontend image
              run: |
                docker build  \
                -t ghcr.io/${{ github.repository }}/frontend:latest  \
                frontend

            - name: Push backend image
              run: |
                docker push ghcr.io/${{ github.repository }}/backend:latest
            
            - name: Push frontend image
              run: |
                docker push ghcr.io/${{ github.repository }}/frontend:latest
