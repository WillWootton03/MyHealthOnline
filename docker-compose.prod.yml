services:
  api:
    image: ghcr.io/${{ github.repository }}/backend:${VERSION}
    expose:
      - "3000"

  frontend:
    image: ghcr.io/${{ github.repository }}/frontend:${VERSION}
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      # used for https, should configure later
      # - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api